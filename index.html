<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼豆图纸生成器 (Perler Bead Pattern Generator)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                <h1 class="text-xl font-bold text-gray-900">拼豆图纸生成器</h1>
            </div>
            <nav class="hidden md:flex space-x-4">
                <a href="#" class="text-gray-500 hover:text-gray-900">使用指南</a>
                <a href="#" class="text-gray-500 hover:text-gray-900">关于</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Column: Controls & Input (4 cols) -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- Upload Zone -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        1. 上传图片
                    </h2>
                    <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-primary hover:bg-blue-50 transition-colors cursor-pointer">
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                        <div class="space-y-2">
                            <div class="mx-auto h-12 w-12 text-gray-400">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <p class="text-sm text-gray-500">点击或拖拽图片到此处</p>
                            <p class="text-xs text-gray-400">支持 JPG, PNG, GIF</p>
                        </div>
                    </div>
                </div>

                <!-- Parameters -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 disabled-section" id="controlsSection">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        2. 调整参数
                    </h2>
                    
                    <!-- Width Control -->
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            宽度 (豆粒数): <span id="widthVal" class="text-primary font-bold">50</span>
                        </label>
                        <input type="range" id="widthRange" min="20" max="150" value="50" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                        <div class="flex justify-between text-xs text-gray-400 mt-1">
                            <span>20</span>
                            <span class="text-xs text-gray-500">提示: 增加宽度可提升细节还原度</span>
                            <span>150</span>
                        </div>
                    </div>

                    <!-- Palette Selection -->
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">颜色品牌库</label>
                        <select id="paletteSelect" class="w-full border-gray-300 rounded-md shadow-sm focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-50 p-2 border">
                            <option value="custom">通用拼豆 (A-H 色号系统)</option>
                            <option value="perler">Perler (标准)</option>
                            <option value="hama">Hama Midi</option>
                            <option value="artkal">Artkal S</option>
                        </select>
                    </div>

                    <!-- Image Adjustments -->
                    <div class="space-y-4 border-t pt-4">
                        <p class="text-sm font-medium text-gray-700">图像增强</p>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">亮度: <span id="brightnessVal">0</span></label>
                            <input type="range" id="brightnessRange" min="-50" max="50" value="0" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-500">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">对比度: <span id="contrastVal">0</span></label>
                            <input type="range" id="contrastRange" min="-50" max="50" value="0" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">饱和度</label>
                            <div class="flex items-center gap-2">
                                <input type="range" id="saturationRange" min="-100" max="100" value="0" class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                                <span id="saturationVal" class="text-sm text-gray-500 w-8">0</span>
                            </div>
                        </div>
                    </div>

                    <!-- Advanced Options -->
                    <div class="mt-4 pt-4 border-t border-gray-100">
                        <div class="mb-4">
                            <p class="text-sm font-medium text-gray-700 mb-2">高级处理</p>
                            
                            <div class="flex flex-wrap gap-4 mb-3">
                                <label class="flex items-center gap-2 cursor-pointer" title="自动增强原图色彩，使结果更鲜艳">
                                    <input type="checkbox" id="autoEnhanceCheck" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary" checked>
                                    <span class="text-sm text-gray-700">自动增强</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer" title="针对动漫/线稿优化，增强线条清晰度">
                                    <input type="checkbox" id="preserveLinesCheck" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary" checked>
                                    <span class="text-sm text-gray-700">保留线条</span>
                                </label>
                            </div>

                            <!-- Background Removal Tool -->
                            <div id="bgRemovalTool" class="bg-blue-50 p-3 rounded-lg border border-blue-100 mb-3">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-medium text-blue-900">背景移除工具</span>
                                    <div class="flex gap-2">
                                        <button id="toggleWandBtn" class="p-1.5 bg-white border border-blue-200 rounded hover:bg-blue-100 transition text-blue-600" title="启用/禁用 魔棒工具 (点击背景移除)">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                                            </svg>
                                        </button>
                                        <button id="undoWandBtn" class="p-1.5 bg-white border border-blue-200 rounded hover:bg-blue-100 transition text-blue-600" title="撤销上一步">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                                            </svg>
                                        </button>
                                        <button id="resetWandBtn" class="p-1.5 bg-white border border-blue-200 rounded hover:bg-blue-100 transition text-red-500" title="重置背景">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="flex items-center justify-between gap-2">
                                    <span class="text-xs text-blue-800">容差: <span id="wandToleranceVal">30</span></span>
                                    <input type="range" id="wandToleranceRange" min="0" max="100" value="30" class="w-20 h-1 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                                </div>
                                <div class="mt-2 flex justify-end">
                                    <button id="autoBgBtn" class="text-xs bg-white border border-blue-200 text-blue-600 px-2 py-1 rounded hover:bg-blue-100 transition" title="自动移除四个角落的同色背景">
                                        自动移除背景
                                    </button>
                                </div>
                            </div>


                        </div>

                        <div class="flex flex-wrap gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="ditheringCheck" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                <span class="text-sm text-gray-700">启用抖动 (Dithering)</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <span class="text-sm text-gray-700">匹配算法:</span>
                                <select id="matchModeSelect" class="text-sm border-gray-300 rounded-md focus:border-primary focus:ring-primary py-1 px-2">
                                    <option value="lab" selected>CIELAB (更精准)</option>
                                    <option value="rgb">RGB (更快)</option>
                                </select>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <span class="text-sm text-gray-700">采样模式:</span>
                                <select id="resizeModeSelect" class="text-sm border-gray-300 rounded-md focus:border-primary focus:ring-primary py-1 px-2">
                                    <option value="dominant" selected>主色采样 (清晰)</option>
                                    <option value="average">平均采样 (柔和)</option>
                                </select>
                            </label>
                        </div>
                        
                        <!-- Grid Alignment -->
                        <div class="mt-3 pt-3 border-t border-gray-100 flex items-center gap-2">
                             <span class="text-sm text-gray-700 font-medium">网格对齐 (Offset):</span>
                             <label class="text-xs text-gray-500">X:</label>
                             <input type="number" id="gridOffsetXInput" value="0" class="w-14 h-7 text-sm border-gray-300 rounded focus:border-primary focus:ring-primary" title="Horizontal Offset (Pixels)">
                             <label class="text-xs text-gray-500 ml-2">Y:</label>
                             <input type="number" id="gridOffsetYInput" value="0" class="w-14 h-7 text-sm border-gray-300 rounded focus:border-primary focus:ring-primary" title="Vertical Offset (Pixels)">
                             <span class="text-xs text-gray-400 ml-2">(微调采样位置)</span>
                        </div>
                    </div>

                    <button id="processBtn" class="w-full mt-6 bg-primary text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition duration-200 font-medium shadow-sm">
                        重新生成预览
                    </button>
                </div>

                <!-- Action -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 disabled-section" id="downloadSection">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        3. 导出图纸
                    </h2>
                    <div class="space-y-3">
                        <button id="downloadPdfBtn" class="w-full flex items-center justify-center space-x-2 border border-transparent bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                            <span>下载 PDF 图纸</span>
                        </button>
                         <button id="downloadImgBtn" class="w-full flex items-center justify-center space-x-2 border border-gray-300 bg-white text-gray-700 py-2 px-4 rounded-md hover:bg-gray-50 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span>下载预览图片</span>
                        </button>
                        <button id="sliceBtn" class="w-full flex items-center justify-center space-x-2 border border-indigo-300 bg-indigo-50 text-indigo-700 py-2 px-4 rounded-md hover:bg-indigo-100 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <span>生成切片 (Slices)</span>
                        </button>
                    </div>
                </div>

            </div>

            <!-- Right Column: Preview (8 cols) -->
            <div class="lg:col-span-8 space-y-6">
                
                <!-- Slice Output Section (Initially Hidden) -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hidden" id="sliceSection">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold">切片预览 (Slices)</h2>
                        <div class="flex items-center space-x-2">
                             <label class="text-sm text-gray-600">切片大小 (Beads):</label>
                             <input type="number" id="sliceSizeInput" value="29" class="w-16 border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm">
                             <button id="regenerateSlicesBtn" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded transition">刷新</button>
                             <button id="closeSliceBtn" class="text-gray-400 hover:text-gray-600 px-2 text-lg">×</button>
                        </div>
                    </div>
                    <div id="sliceContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 overflow-auto max-h-[600px]">
                        <!-- Slices will be injected here -->
                    </div>
                </div>

                <!-- Preview Canvas -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 min-h-[500px] flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold">实时预览</h2>
                        <div class="flex items-center space-x-3">
                             <label class="inline-flex items-center">
                                <input type="checkbox" id="showGridCheck" checked class="rounded border-gray-300 text-primary shadow-sm focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-50">
                                <span class="ml-1 text-sm text-gray-600">网格</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="checkbox" id="showCoordsCheck" checked class="rounded border-gray-300 text-primary shadow-sm focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-50">
                                <span class="ml-1 text-sm text-gray-600">坐标</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="checkbox" id="showCodesCheck" checked class="rounded border-gray-300 text-primary shadow-sm focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-50">
                                <span class="ml-1 text-sm text-gray-600">色号</span>
                            </label>
                            <span class="text-sm text-gray-400">|</span>
                            <label class="inline-flex items-center" title="显示大网格 (便于拼装)">
                                <input type="checkbox" id="showRefGridCheck" class="rounded border-gray-300 text-primary shadow-sm focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-50">
                                <span class="ml-1 text-sm text-gray-600">大网格</span>
                            </label>
                             <input type="number" id="refGridSize" value="29" min="5" max="100" class="w-12 h-6 text-xs border-gray-300 rounded ml-1" title="大网格尺寸">
                            <span class="text-sm text-gray-400">|</span>
                             <div class="text-sm text-gray-500">
                                 尺寸: <span id="previewDims">- x -</span>
                             </div>
                        </div>
                    </div>
                    
                    <div class="flex-grow flex items-center justify-center bg-gray-100 rounded-lg overflow-auto p-4 relative" id="canvasContainer">
                        <p id="emptyState" class="text-gray-400 text-center">
                            请先在左侧上传图片<br>
                            生成的像素图将在此显示
                        </p>
                        <!-- Main display canvas -->
                        <canvas id="pixelCanvas" class="hidden shadow-lg max-w-full"></canvas>
                    </div>
                </div>

                <!-- Color List / Bill of Materials -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hidden" id="bomSection">
                    <h2 class="text-lg font-semibold mb-4">颜色用量表</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">颜色预览</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">色号 / 名称</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">数量 (颗)</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200" id="bomBody">
                                <!-- Filled by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Hidden Processing Canvas -->
    <canvas id="processCanvas" class="hidden"></canvas>

    <script src="colors.js"></script>
    <script src="app.js"></script>
</body>
</html>
